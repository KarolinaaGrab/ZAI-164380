{% extends "base.html" %}

{% block title %}Usuń projekt{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body">
                <h2 class="text-danger">Usuń projekt</h2>
                <p>Czy na pewno chcesz usunąć projekt: <strong>{{ object.name }}</strong>?</p>

                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Usuń</button>
                    <a href="{% url 'project_list' %}" class="btn btn-secondary">Anuluj</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
