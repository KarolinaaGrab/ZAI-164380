{% extends "base.html" %}

{% block title %}Usuń tag{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="card-title mb-4">Usuń tag</h1>
        <p>Czy na pewno chcesz usunąć tag <strong>{{ object.name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Usuń</button>
            <a href="{% url 'tag_list' %}" class="btn btn-secondary">Anuluj</a>
        </form>
    </div>
</div>
{% endblock %}
