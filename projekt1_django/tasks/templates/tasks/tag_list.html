{% extends "base.html" %}

{% block title %}Tagi{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="mb-0">Lista tagów</h1>
    <a href="{% url 'tag_add' %}" class="btn btn-primary">+</a>
</div>

{% if tags %}
<table class="table table-striped table-hover align-middle">
    <thead class="table-primary">
        <tr>
            <th>Nazwa</th>
            <th>Liczba zadań</th>
            <th>Akcje</th>
        </tr>
    </thead>
    <tbody>
        {% for tag in tags %}
        <tr>
            <td>{{ tag.name }}</td>
            <td>{{ tag.tasks.count }}</td>
            <td>
                <a href="{% url 'tag_edit' tag.pk %}" class="btn btn-sm btn-outline-warning">Edytuj</a>
                <a href="{% url 'tag_delete' tag.pk %}" class="btn btn-sm btn-outline-danger">Usuń</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<div class="alert alert-info">Brak tagów.</div>
{% endif %}
{% endblock %}
