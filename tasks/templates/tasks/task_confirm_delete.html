{% extends "base.html" %}

{% block title %}Usuń zadanie{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body">
                <h2 class="text-danger">Usuń zadanie</h2>
                <p>Czy na pewno chcesz usunąć zadanie:</p>
                <h4>{{ object.title }}</h4>

                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Tak, usuń</button>
                    <a href="{% url 'task_list' %}" class="btn btn-secondary">Anuluj</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
